server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fallback to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Better handling of static assets
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }
}
